name: GPU Diag (driver + torch kernel launch)
# Throwaway-ish diagnostic for the dev_lab gfx1151 runners: prints driver/runtime
# facts and runs one trivial GPU kernel launch with the matched nightly torch, to
# tell apart "code objects won't load (driver/ISA/xnack mismatch)" from a working
# box. Pinned by runner-name label so we can target a specific box.
on:
  # push trigger (scoped to this file) so it runs from the feature branch without
  # the workflow_dispatch "must be on default branch" limitation. Runner defaults
  # to ta-devlab-halo-01 on push.
  push:
    branches: [feat/build-qualification]
    paths: ['.github/workflows/gpu-diag.yml']
  workflow_dispatch:
    inputs:
      runner:
        description: 'Self-hosted runner name label to target'
        required: false
        default: 'ta-devlab-halo-01'
      torch_spec:
        description: 'torch spec to test'
        required: false
        default: 'torch[device-gfx1151]==2.11.0+rocm7.14.0a20260603'

jobs:
  diag:
    runs-on: [self-hosted, Linux, "${{ github.event.inputs.runner || 'ta-devlab-halo-01' }}"]
    steps:
    - name: Driver / runtime facts
      run: |
        echo "host: $(hostname)"
        echo "kernel: $(uname -r)"
        echo "amdgpu driver: $(cat /sys/module/amdgpu/version 2>/dev/null || echo unknown)"
        echo "--- rocminfo (target ID + runtime version) ---"
        rocminfo 2>/dev/null | grep -iE 'Runtime Version|Name:|gfx|xnack|Marketing' || echo "rocminfo not found"
        echo "--- system ROCm ---"
        ls -d /opt/rocm* 2>/dev/null || echo "no /opt/rocm"
        cat /opt/rocm/.info/version 2>/dev/null || true
        echo "--- dmesg amdgpu tail ---"
        dmesg 2>/dev/null | grep -i amdgpu | tail -20 || echo "dmesg unavailable (need privilege)"

    - name: torch GPU kernel-launch repro (portable py3.13 + matched nightly torch)
      run: |
        set -uo pipefail
        ROOT="$RUNNER_TEMP/diag"
        rm -rf "$ROOT"; mkdir -p "$ROOT"
        PBS_TAG="20260602"
        curl -fsSL "https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-3.13.13+${PBS_TAG}-x86_64-unknown-linux-gnu-install_only.tar.gz" | tar -xz -C "$ROOT"
        PY="$ROOT/python/bin/python3.13"
        "$PY" --version
        "$PY" -m pip install -q --index-url https://rocm.nightlies.amd.com/whl-multi-arch \
          --extra-index-url https://pypi.org/simple/ \
          "${{ github.event.inputs.torch_spec || 'torch[device-gfx1151]==2.11.0+rocm7.14.0a20260603' }}"
        echo "=== kernel launches (torch-only; AMD_SERIALIZE_KERNEL=3 makes errors synchronous) ==="
        AMD_SERIALIZE_KERNEL=3 "$PY" -c "
        import torch
        print('torch', torch.__version__, '| device', torch.cuda.get_device_name())
        def step(name, fn):
            try:
                out = fn(); torch.cuda.synchronize(); print('OK  ', name, out)
            except Exception as e:
                print('FAIL', name, '->', type(e).__name__, str(e).splitlines()[0])
        step('zeros+add f32',  lambda: (torch.zeros(4, device='cuda') + 1).cpu().tolist())
        step('zeros int32 cuda', lambda: torch.zeros(8, dtype=torch.int32, device='cuda').cpu().tolist())
        # the exact op vLLM dies on: zeros_like from a PINNED int32 host tensor -> cuda
        step('zeros_like pinned int32', lambda: torch.zeros_like(torch.zeros(8, dtype=torch.int32, pin_memory=True), device='cuda').cpu().tolist())
        step('matmul f16 64x64', lambda: float((torch.randn(64,64,device='cuda',dtype=torch.float16) @ torch.randn(64,64,device='cuda',dtype=torch.float16)).sum()))
        print('DONE')
        " 2>&1 | tail -40
        rm -rf "$ROOT"
